name: Build and Deploy to CCE

on:
  push:
    branches: [main]
    paths:
      - 'part1/backend/**'
      - 'part1/frontend/**'

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  SWR_ORG: ${{ secrets.SWR_ORG }}
  BACKEND_IMAGE: ${{ secrets.SWR_ORG }}/backend
  FRONTEND_IMAGE: ${{ secrets.SWR_ORG }}/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: swr.cn-north-4.myhuaweicloud.com
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: part1/backend
          push: true
          tags: |
            ${{ env.SWR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:v1
            ${{ env.SWR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: part1/frontend
          push: true
          tags: |
            ${{ env.SWR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:v1
            ${{ env.SWR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

      - name: Restart deployments to pull new images
        run: |
          kubectl rollout restart deployment/backend -n default
          kubectl rollout restart deployment/frontend -n default
          kubectl rollout status deployment/backend -n default --timeout=120s
          kubectl rollout status deployment/frontend -n default --timeout=120s
