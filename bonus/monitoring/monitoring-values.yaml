grafana:
  enabled: true
  adminPassword: "admin123456"
  service:
    type: ClusterIP
  image:
    registry: swr.cn-north-4.myhuaweicloud.com
    repository: <YOUR_ORG>/grafana
    tag: "12.4.3"
  sidecar:
    image:
      registry: swr.cn-north-4.myhuaweicloud.com
      repository: <YOUR_ORG>/k8s-sidecar
      tag: "2.6.0"

prometheus:
  enabled: true
  service:
    type: ClusterIP
  prometheusSpec:
    retention: 7d
    image:
      registry: swr.cn-north-4.myhuaweicloud.com
      repository: <YOUR_ORG>/prometheus
      tag: "v3.11.2"
  thanosService:
    enabled: false
  thanosServiceExternal:
    enabled: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    image:
      registry: swr.cn-north-4.myhuaweicloud.com
      repository: <YOUR_ORG>/alertmanager
      tag: "v0.32.0"

prometheusOperator:
  image:
    registry: swr.cn-north-4.myhuaweicloud.com
    repository: <YOUR_ORG>/prometheus-operator
    tag: "v0.90.1"
  prometheusDefaultBaseImage: <YOUR_ORG>/prometheus
  prometheusDefaultBaseImageRegistry: swr.cn-north-4.myhuaweicloud.com
  admissionWebhooks:
    patch:
      image:
        registry: swr.cn-north-4.myhuaweicloud.com
        repository: <YOUR_ORG>/kube-webhook-certgen
        tag: "1.8.1"
  prometheusConfigReloader:
    image:
      registry: swr.cn-north-4.myhuaweicloud.com
      repository: <YOUR_ORG>/prometheus-config-reloader
      tag: "v0.90.1"

kubeStateMetrics:
  enabled: false

kube-state-metrics:
  image:
    registry: swr.cn-north-4.myhuaweicloud.com
    repository: <YOUR_ORG>/kube-state-metrics
    tag: "v2.18.0"
  imagePullSecrets: []

prometheus-node-exporter:
  image:
    registry: swr.cn-north-4.myhuaweicloud.com
    repository: <YOUR_ORG>/node-exporter
    tag: "v1.11.1"

global:
  imagePullSecrets:
    - name: swr-secret
